---
# Install — dnf packages + openssl

- name: Install Symas OpenLDAP packages
  ansible.builtin.dnf:
    name:
      - symas-openldap-servers
      - symas-openldap-clients
    state: present

- name: Install openssl
  ansible.builtin.dnf:
    name: openssl
    state: present

- name: Install python3 for SSHA hashing
  ansible.builtin.dnf:
    name: python3
    state: present

- name: Create symas env profile
  ansible.builtin.template:
    src: symas_env.sh.j2
    dest: /etc/profile.d/symas_env.sh
    mode: "0644"

- name: Create ldap.conf
  ansible.builtin.template:
    src: ldap.conf.j2
    dest: "{{ symas_conf }}/ldap.conf"
    mode: "0644"
