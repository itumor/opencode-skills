stages:
  - validate
  - deploy
  - install
  - test
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: terraform/openldap-master-replica/instances
  AWS_DEFAULT_REGION: us-west-2
  S3_SCRIPTS_BUCKET: "nextgenopen-ci-scripts"
  # Bank deployment credentials
  BASE_DN: "dc=eab,dc=bank,dc=local"
  ADMIN_DN: "cn=admin,dc=eab,dc=bank,dc=local"
  ADMIN_PW: "TheN1le1"
  REPL_DN: "cn=replicator,dc=eab,dc=bank,dc=local"
  REPL_PW: "replpass"

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck --severity=error script/*.sh
    - shellcheck --severity=error script/replica/*.sh
    - shellcheck --severity=error script/replica/test/*.sh

terraform-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

# ---- Deploy infrastructure (bank config) ----
deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform apply -auto-approve -var-file=../ci.tfvars
    - terraform output -json > outputs.json
  artifacts:
    paths:
      - $TF_ROOT/outputs.json
    expire_in: 1h

# ---- Push scripts to S3, then SSM install ----
install-master:
  stage: install
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  before_script:
    - yum install -y jq tar gzip >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - aws s3api head-bucket --bucket "$S3_SCRIPTS_BUCKET" 2>/dev/null || aws s3 mb "s3://$S3_SCRIPTS_BUCKET" --region "$AWS_DEFAULT_REGION"
  script:
    # Package scripts and upload
    - tar czf /tmp/openldap-scripts.tar.gz script/
    - aws s3 cp /tmp/openldap-scripts.tar.gz "s3://$S3_SCRIPTS_BUCKET/openldap-scripts.tar.gz"
    # Wait for SSM, then run master installer
    - ./.gitlab/ssm-wait.sh "$MASTER_ID"
    - >
      ./.gitlab/ssm-exec.sh "$MASTER_ID"
      "aws s3 cp s3://$S3_SCRIPTS_BUCKET/openldap-scripts.tar.gz /tmp/scripts.tar.gz --region $AWS_DEFAULT_REGION
      && mkdir -p /tmp/script
      && tar xzf /tmp/scripts.tar.gz -C /tmp/script
      && bash /tmp/script/script/install-symas-openldap-all-in-one.sh"
  allow_failure: false

install-replica:
  stage: install
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
    - MASTER_IP=$(jq -r '.master_private_ip.value' $TF_ROOT/outputs.json)
  script:
    - ./.gitlab/ssm-wait.sh "$REPLICA_ID"
    - >
      ./.gitlab/ssm-exec.sh "$REPLICA_ID"
      "aws s3 cp s3://$S3_SCRIPTS_BUCKET/openldap-scripts.tar.gz /tmp/scripts.tar.gz --region $AWS_DEFAULT_REGION
      && mkdir -p /tmp/script
      && tar xzf /tmp/scripts.tar.gz -C /tmp/script
      && MASTER_IP=$MASTER_IP ADMIN_PW=$ADMIN_PW REPL_PW=$REPL_PW LDAPTLS_REQCERT=never
      bash /tmp/script/script/install-symas-openldap-replica-all-in-one.sh"
  allow_failure: false

# ---- Test: run verification scripts (same as bank) ----
test-master:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy, install-master]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
  script:
    - ./.gitlab/ssm-exec.sh "$MASTER_ID" "ADMIN_PW=$ADMIN_PW REPL_PW=$REPL_PW bash /tmp/script/script/verify-master.sh"

test-replica:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy, install-replica]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
    - MASTER_IP=$(jq -r '.master_private_ip.value' $TF_ROOT/outputs.json)
  script:
    - ./.gitlab/ssm-exec.sh "$REPLICA_ID" "MASTER_IP=$MASTER_IP ADMIN_PW=$ADMIN_PW REPL_PW=$REPL_PW LDAPTLS_REQCERT=never bash /tmp/script/script/verify-replica.sh"

test-sync:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy, install-master, install-replica]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
  script:
    # E2E test: create user on master, verify on replica
    - TEST_UID="ci-e2e-$(date -u +%Y%m%d%H%M%S)"
    # Write LDIF to file then add (avoids JSON quote escaping in SSM)
    - >
      ./.gitlab/ssm-exec.sh "$MASTER_ID"
      "cat > /tmp/e2e-user.ldif <<EOF
      dn: uid=$TEST_UID,ou=Users,$BASE_DN
      objectClass: inetOrgPerson
      cn: CI E2E Test
      sn: Test
      uid: $TEST_UID
      EOF
      LDAPTLS_REQCERT=never /opt/symas/bin/ldapadd -x -ZZ -H ldap://localhost:389 -D $ADMIN_DN -w $ADMIN_PW -f /tmp/e2e-user.ldif"
    - sleep 15
    - >
      ./.gitlab/ssm-exec.sh "$REPLICA_ID"
      "LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ -H ldap://localhost:389 -D $ADMIN_DN -w $ADMIN_PW -b $BASE_DN \"(uid=$TEST_UID)\" dn"
    # Cleanup
    - >
      ./.gitlab/ssm-exec.sh "$MASTER_ID"
      "/opt/symas/bin/ldapdelete -x -H ldap://localhost:389 -D $ADMIN_DN -w $ADMIN_PW \"uid=$TEST_UID,ou=Users,$BASE_DN\""

# ---- Destroy ----
destroy:
  stage: destroy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  when: always
  allow_failure: true
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform destroy -auto-approve -var-file=../ci.tfvars
