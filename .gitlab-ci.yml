stages:
  - validate
  - deploy
  - test
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: terraform/openldap-master-replica
  AWS_DEFAULT_REGION: us-west-2
  TF_VAR_admin_cidr_blocks: '["0.0.0.0/0"]'
  TF_VAR_ldap_cidr_blocks: '["0.0.0.0/0"]'

# ---------------------------------------------------------------------------
# Stage 1 — Validate
# ---------------------------------------------------------------------------

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck script/*.sh
    - shellcheck script/replica/*.sh
    - shellcheck script/replica/test/*.sh

terraform-validate:
  stage: validate
  image: hashicorp/terraform:1.10
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

# ---------------------------------------------------------------------------
# Stage 2 — Deploy
# ---------------------------------------------------------------------------

deploy:
  stage: deploy
  image: hashicorp/terraform:1.10
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY"  > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "$SSH_PRIVATE_KEY" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - chmod 600 $TF_ROOT/.local-ssh/openldap_master_replica
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform apply -auto-approve
    - terraform output -json > outputs.json
  artifacts:
    paths:
      - $TF_ROOT/terraform.tfstate
      - $TF_ROOT/outputs.json
    expire_in: 1h

# ---------------------------------------------------------------------------
# Stage 3 — Test
# ---------------------------------------------------------------------------

test-master:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openssh-client jq
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json) >> ~/.ssh/known_hosts
  script:
    - MASTER_IP=$(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json)
    - |
      echo "=== Master admin bind ==="
      ssh ec2-user@$MASTER_IP \
        "sudo /opt/symas/bin/ldapwhoami -x -H ldap://localhost:389 \
         -D 'cn=admin,dc=cae,dc=local' -w admin"
    - |
      echo "=== Master list entries ==="
      ssh ec2-user@$MASTER_IP \
        "sudo /opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 \
         -D 'cn=admin,dc=cae,dc=local' -w admin \
         -b 'dc=cae,dc=local' -s one dn"
    - |
      echo "=== Replicator user exists ==="
      ssh ec2-user@$MASTER_IP \
        "sudo /opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 \
         -D 'cn=admin,dc=cae,dc=local' -w admin \
         -b 'dc=cae,dc=local' '(cn=replicator)' dn"

test-replica:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openssh-client jq
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json) >> ~/.ssh/known_hosts
  script:
    - REPLICA_IP=$(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json)
    - MASTER_IP=$(jq -r '.master_private_ip.value' $TF_ROOT/outputs.json)
    - |
      echo "=== Replica admin bind ==="
      ssh ec2-user@$REPLICA_IP \
        "sudo LDAPTLS_REQCERT=never /opt/symas/bin/ldapwhoami -x -ZZ \
         -H ldap://localhost:389 \
         -D 'cn=admin,dc=cae,dc=local' -w admin"
    - |
      echo "=== Replica list entries ==="
      ssh ec2-user@$REPLICA_IP \
        "sudo LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ \
         -H ldap://localhost:389 \
         -D 'cn=admin,dc=cae,dc=local' -w admin \
         -b 'dc=cae,dc=local' -s one dn"
    - |
      echo "=== Replica write rejection ==="
      ssh ec2-user@$REPLICA_IP \
        'sudo LDAPTLS_REQCERT=never /opt/symas/bin/ldapadd -x -ZZ \
         -H ldap://localhost:389 \
         -D "cn=admin,dc=cae,dc=local" -w admin' <<LDIF
      dn: cn=ci-test,dc=cae,dc=local
      objectClass: top
      objectClass: organizationalRole
      cn: ci-test
      LDIF

test-sync:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openssh-client jq
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json) >> ~/.ssh/known_hosts
    - ssh-keyscan -H $(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json) >> ~/.ssh/known_hosts
  script:
    - MASTER_IP=$(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json)
    - REPLICA_IP=$(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json)
    - BASE_DN=$(jq -r '.ldap_admin_dn.value' $TF_ROOT/outputs.json | sed 's/cn=admin,//')
    - TEST_UID="ci-sync-$(date -u +%Y%m%d%H%M%S)"
    - |
      echo "=== Write test user to master ==="
      cat > /tmp/test-user.ldif <<LDIF
      dn: uid=$TEST_UID,ou=people,$BASE_DN
      objectClass: inetOrgPerson
      cn: CI Sync Test
      sn: Test
      uid: $TEST_UID
      LDIF
      scp /tmp/test-user.ldif ec2-user@$MASTER_IP:/tmp/
      ssh ec2-user@$MASTER_IP \
        "sudo /opt/symas/bin/ldapadd -x -H ldap://localhost:389 \
         -D 'cn=admin,$BASE_DN' -w admin -f /tmp/test-user.ldif"
    - |
      echo "=== Wait for replication ==="
      sleep 10
    - |
      echo "=== Verify test user on replica ==="
      ssh ec2-user@$REPLICA_IP \
        "sudo LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ \
         -H ldap://localhost:389 \
         -D 'cn=admin,$BASE_DN' -w admin \
         -b '$BASE_DN' '(uid=$TEST_UID)' dn"
    - |
      echo "=== Cleanup ==="
      ssh ec2-user@$MASTER_IP \
        "sudo /opt/symas/bin/ldapdelete -x -H ldap://localhost:389 \
         -D 'cn=admin,$BASE_DN' -w admin \
         'uid=$TEST_UID,ou=people,$BASE_DN'"

# ---------------------------------------------------------------------------
# Stage 4 — Destroy (always runs)
# ---------------------------------------------------------------------------

destroy:
  stage: destroy
  image: hashicorp/terraform:1.10
  needs: [deploy]
  when: always
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY"  > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "$SSH_PRIVATE_KEY" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 600 $TF_ROOT/.local-ssh/openldap_master_replica
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform destroy -auto-approve
