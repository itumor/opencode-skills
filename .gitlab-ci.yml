stages:
  - validate
  - deploy
  - test
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: terraform/openldap-master-replica/instances
  AWS_DEFAULT_REGION: us-west-2

# ---------------------------------------------------------------------------
# Stage 1 — Validate
# ---------------------------------------------------------------------------

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck --severity=error script/*.sh
    - shellcheck --severity=error script/replica/*.sh
    - shellcheck --severity=error script/replica/test/*.sh

terraform-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

# ---------------------------------------------------------------------------
# Stage 2 — Deploy (S3 backend, persistent VPC)
# ---------------------------------------------------------------------------

deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform apply -auto-approve
    - terraform output -json > outputs.json
  artifacts:
    paths:
      - $TF_ROOT/outputs.json
    expire_in: 1h

# ---------------------------------------------------------------------------
# Stage 3 — Test (LDAP protocol, no SSH)
# ---------------------------------------------------------------------------

test-master:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - |
      echo "Waiting for master SSM agent..."
      for i in $(seq 1 30); do
        if aws ssm describe-instance-information \
          --filters "Key=InstanceIds,Values=$MASTER_ID" \
          --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null | grep -q Online; then
          echo "Master SSM online"
          break
        fi
        echo "  attempt $i/30, waiting 10s..."
        sleep 10
      done
  script:
    - |
      echo "=== Master admin bind ==="
      aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$MASTER_ID" \
        --parameters '{"commands":["/opt/symas/bin/ldapwhoami -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin"]}' \
        --query 'Command.CommandId' --output text > /tmp/cmd-id.txt
      CMD_ID=$(cat /tmp/cmd-id.txt)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$MASTER_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$MASTER_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Master list entries ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$MASTER_ID" \
        --parameters '{"commands":["/opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local -s one dn"]}' \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$MASTER_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$MASTER_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Replicator user exists ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$MASTER_ID" \
        --parameters '{"commands":["/opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local (cn=replicator) dn"]}' \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$MASTER_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$MASTER_ID" \
        --query 'StandardOutputContent' --output text

test-replica:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
    - |
      echo "Waiting for replica SSM agent..."
      for i in $(seq 1 30); do
        if aws ssm describe-instance-information \
          --filters "Key=InstanceIds,Values=$REPLICA_ID" \
          --query 'InstanceInformationList[0].PingStatus' --output text 2>/dev/null | grep -q Online; then
          echo "Replica SSM online"
          break
        fi
        echo "  attempt $i/30, waiting 10s..."
        sleep 10
      done
  script:
    - |
      echo "=== Replica admin bind ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$REPLICA_ID" \
        --parameters '{"commands":["LDAPTLS_REQCERT=never /opt/symas/bin/ldapwhoami -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin"]}' \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$REPLICA_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$REPLICA_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Replica list entries ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$REPLICA_ID" \
        --parameters '{"commands":["LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local -s one dn"]}' \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$REPLICA_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$REPLICA_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Replica write rejection ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$REPLICA_ID" \
        --parameters '{"commands":["LDAPTLS_REQCERT=never /opt/symas/bin/ldapadd -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin <<LDIF\ndn: cn=ci-test,dc=cae,dc=local\nobjectClass: top\nobjectClass: organizationalRole\ncn: ci-test\nLDIF"]}' \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$REPLICA_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$REPLICA_ID" \
        --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' --output json

test-sync:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
  script:
    - TEST_UID="ci-sync-$(date -u +%Y%m%d%H%M%S)"
    - |
      echo "=== Write test user to master ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$MASTER_ID" \
        --parameters "{\"commands\":[\"/opt/symas/bin/ldapadd -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin <<LDIF\ndn: uid=$TEST_UID,ou=people,dc=cae,dc=local\nobjectClass: inetOrgPerson\ncn: CI Sync Test\nsn: Test\nuid: $TEST_UID\nLDIF\"]}" \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$MASTER_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$MASTER_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Wait for replication ==="
      sleep 15
    - |
      echo "=== Verify test user on replica ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$REPLICA_ID" \
        --parameters "{\"commands\":[\"LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local (uid=$TEST_UID) dn\"]}" \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$REPLICA_ID"
      aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$REPLICA_ID" \
        --query 'StandardOutputContent' --output text
    - |
      echo "=== Cleanup ==="
      CMD_ID=$(aws ssm send-command --document-name "AWS-RunShellScript" \
        --targets "Key=InstanceIds,Values=$MASTER_ID" \
        --parameters "{\"commands\":[\"/opt/symas/bin/ldapdelete -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin uid=$TEST_UID,ou=people,dc=cae,dc=local\"]}" \
        --query 'Command.CommandId' --output text)
      aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$MASTER_ID"

# ---------------------------------------------------------------------------
# Stage 4 — Destroy (S3 backend, always runs)
# ---------------------------------------------------------------------------

destroy:
  stage: destroy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  when: always
  allow_failure: true
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform destroy -auto-approve
