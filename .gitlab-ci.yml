stages:
  - validate
  - deploy
  - test
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: terraform/openldap-master-replica/instances
  AWS_DEFAULT_REGION: us-west-2

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck --severity=error script/*.sh
    - shellcheck --severity=error script/replica/*.sh
    - shellcheck --severity=error script/replica/test/*.sh

terraform-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

deploy:
  stage: deploy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform apply -auto-approve
    - terraform output -json > outputs.json
  artifacts:
    paths:
      - $TF_ROOT/outputs.json
    expire_in: 1h

# ---------------------------------------------------------------------------
# Stage 3 — Test (SSM Run Command)
# ---------------------------------------------------------------------------

test-master:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - ./.gitlab/ssm-wait.sh "$MASTER_ID"
  script:
    - ./.gitlab/ssm-exec.sh "$MASTER_ID" '/opt/symas/bin/ldapwhoami -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin'
    - ./.gitlab/ssm-exec.sh "$MASTER_ID" '/opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local -s one dn'
    - ./.gitlab/ssm-exec.sh "$MASTER_ID" '/opt/symas/bin/ldapsearch -LLL -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local (cn=replicator) dn'

test-replica:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
    - ./.gitlab/ssm-wait.sh "$REPLICA_ID"
  script:
    - ./.gitlab/ssm-exec.sh "$REPLICA_ID" 'LDAPTLS_REQCERT=never /opt/symas/bin/ldapwhoami -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin'
    - ./.gitlab/ssm-exec.sh "$REPLICA_ID" 'LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local -s one dn'

test-sync:
  stage: test
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: [deploy]
  allow_failure: true
  before_script:
    - yum install -y jq >/dev/null 2>&1
    - MASTER_ID=$(jq -r '.master_instance_id.value' $TF_ROOT/outputs.json)
    - REPLICA_ID=$(jq -r '.replica_instance_id.value' $TF_ROOT/outputs.json)
    - ./.gitlab/ssm-wait.sh "$MASTER_ID"
    - ./.gitlab/ssm-wait.sh "$REPLICA_ID"
  script:
    - TEST_UID="ci-sync-$(date -u +%Y%m%d%H%M%S)"
    - |
      CMD="echo -e 'dn: uid=$TEST_UID,ou=people,dc=cae,dc=local\nobjectClass: inetOrgPerson\ncn: CI Sync Test\nsn: Test\nuid: $TEST_UID' | /opt/symas/bin/ldapadd -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin"
      echo "=== Write test user to master ==="
      ./.gitlab/ssm-exec.sh "$MASTER_ID" "$CMD"
    - |
      echo "=== Wait for replication ==="
      sleep 15
    - |
      echo "=== Verify test user on replica ==="
      ./.gitlab/ssm-exec.sh "$REPLICA_ID" \
        "LDAPTLS_REQCERT=never /opt/symas/bin/ldapsearch -LLL -x -ZZ -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin -b dc=cae,dc=local '(uid=$TEST_UID)' dn"
    - |
      echo "=== Cleanup ==="
      ./.gitlab/ssm-exec.sh "$MASTER_ID" \
        "/opt/symas/bin/ldapdelete -x -H ldap://localhost:389 -D cn=admin,dc=cae,dc=local -w admin uid=$TEST_UID,ou=people,dc=cae,dc=local"

# ---------------------------------------------------------------------------
# Stage 4 — Destroy (S3 backend, always runs)
# ---------------------------------------------------------------------------

destroy:
  stage: destroy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  when: always
  allow_failure: true
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
    - cd $TF_ROOT
    - terraform init
    - terraform destroy -auto-approve
