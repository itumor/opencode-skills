stages:
  - validate
  - clean
  - deploy
  - test
  - destroy

variables:
  TF_IN_AUTOMATION: "true"
  TF_ROOT: terraform/openldap-master-replica
  AWS_DEFAULT_REGION: us-west-2
  TF_VAR_admin_cidr_blocks: '["0.0.0.0/0"]'
  TF_VAR_ldap_cidr_blocks: '["0.0.0.0/0"]'
  TF_VAR_ssh_public_key_path: ".local-ssh/openldap_master_replica.pub"
  TF_VAR_ssh_private_key_path: ".local-ssh/openldap_master_replica"

# ---------------------------------------------------------------------------
# Stage 1 — Validate
# ---------------------------------------------------------------------------

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:v0.10.0
  script:
    - shellcheck --severity=error script/*.sh
    - shellcheck --severity=error script/replica/*.sh
    - shellcheck --severity=error script/replica/test/*.sh

terraform-validate:
  stage: validate
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform validate

# ---------------------------------------------------------------------------
# Stage 2 — Clean (remove orphaned resources from previous runs)
# ---------------------------------------------------------------------------

cleanup:
  stage: clean
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  resource_group: openldap-deploy
  script:
    - |
      echo "=== Removing orphaned instances ==="
      for id in $(aws ec2 describe-instances \
        --filters "Name=tag:Project,Values=openldap-mr" "Name=instance-state-name,Values=running,stopped" \
        --query 'Reservations[*].Instances[*].InstanceId' --output text); do
        echo "Terminating $id"
        aws ec2 terminate-instances --instance-ids $id
      done
    - |
      # Wait for all instances to terminate
      for id in $(aws ec2 describe-instances \
        --filters "Name=tag:Project,Values=openldap-mr" "Name=instance-state-name,Values=running,stopped" \
        --query 'Reservations[*].Instances[*].InstanceId' --output text); do
        echo "Waiting for $id to terminate..."
        aws ec2 wait instance-terminated --instance-ids $id
      done
    - |
      echo "=== Removing orphaned VPCs ==="
      for vpc in $(aws ec2 describe-vpcs \
        --filters "Name=tag:Project,Values=openldap-mr" \
        --query 'Vpcs[*].VpcId' --output text); do
        echo "Deleting dependencies for VPC $vpc..."
        for igw in $(aws ec2 describe-internet-gateways --filters "Name=attachment.vpc-id,Values=$vpc" --query 'InternetGateways[*].InternetGatewayId' --output text); do
          aws ec2 detach-internet-gateway --internet-gateway-id $igw --vpc-id $vpc 2>/dev/null || true
          aws ec2 delete-internet-gateway --internet-gateway-id $igw 2>/dev/null || true
        done
        for sn in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc" --query 'Subnets[*].SubnetId' --output text); do
          aws ec2 delete-subnet --subnet-id $sn 2>/dev/null || true
        done
        for sg in $(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$vpc" --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text); do
          aws ec2 delete-security-group --group-id $sg 2>/dev/null || true
        done
        for rt in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc" --query 'RouteTables[?Associations[0].Main==`false`].RouteTableId' --output text); do
          aws ec2 delete-route-table --route-table-id $rt 2>/dev/null || true
        done
        sleep 10
        aws ec2 delete-vpc --vpc-id $vpc && echo "Deleted VPC $vpc" || echo "VPC $vpc may have remaining deps"
      done
    - |
      for kp in $(aws ec2 describe-key-pairs --filters "Name=key-name,Values=openldap-mr-*" --query 'KeyPairs[*].KeyName' --output text); do
        aws ec2 delete-key-pair --key-name "$kp" 2>/dev/null && echo "Deleted key pair $kp" || true
      done
    - echo "Cleanup complete"

# ---------------------------------------------------------------------------
# Stage 3 — Deploy
# ---------------------------------------------------------------------------

deploy:
  stage: deploy
  resource_group: openldap-deploy
  image:
    name: hashicorp/terraform:1.10
    entrypoint: [""]
  before_script:
    - mkdir -p $TF_ROOT/.local-ssh
    - echo "$SSH_PUBLIC_KEY_B64" | base64 -d > $TF_ROOT/.local-ssh/openldap_master_replica.pub
    - echo "dummy" > $TF_ROOT/.local-ssh/openldap_master_replica
    - chmod 644 $TF_ROOT/.local-ssh/openldap_master_replica.pub
  script:
  script:
    - cd $TF_ROOT
    - terraform init -backend=false
    - terraform apply -auto-approve
    - terraform output -json > outputs.json
  artifacts:
    paths:
      - $TF_ROOT/terraform.tfstate
      - $TF_ROOT/outputs.json
    expire_in: 1h

# ---------------------------------------------------------------------------
# Stage 3 — Test
# ---------------------------------------------------------------------------

test-master:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openldap-clients jq
    - MASTER_IP=$(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json)
    - |
      echo "Waiting for master LDAP ($MASTER_IP:389)..."
      for i in $(seq 1 30); do
        if ldapsearch -x -H "ldap://$MASTER_IP:389" -b '' -s base dn >/dev/null 2>&1; then
          echo "Master LDAP ready"
          break
        fi
        echo "  attempt $i/30, waiting 10s..."
        sleep 10
      done
  script:
    - |
      echo "=== Master admin bind ==="
      ldapwhoami -x -H "ldap://$MASTER_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin
    - |
      echo "=== Master list entries ==="
      ldapsearch -LLL -x -H "ldap://$MASTER_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin \
        -b 'dc=cae,dc=local' -s one dn
    - |
      echo "=== Replicator user exists ==="
      ldapsearch -LLL -x -H "ldap://$MASTER_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin \
        -b 'dc=cae,dc=local' '(cn=replicator)' dn

test-replica:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openldap-clients jq
    - REPLICA_IP=$(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json)
    - |
      echo "Waiting for replica LDAP ($REPLICA_IP:389)..."
      for i in $(seq 1 30); do
        if LDAPTLS_REQCERT=never ldapsearch -x -ZZ -H "ldap://$REPLICA_IP:389" -b '' -s base dn >/dev/null 2>&1; then
          echo "Replica LDAP ready"
          break
        fi
        echo "  attempt $i/30, waiting 10s..."
        sleep 10
      done
  script:
    - REPLICA_IP=$(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json)
    - |
      echo "=== Replica admin bind ==="
      LDAPTLS_REQCERT=never ldapwhoami -x -ZZ \
        -H "ldap://$REPLICA_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin
    - |
      echo "=== Replica list entries ==="
      LDAPTLS_REQCERT=never ldapsearch -LLL -x -ZZ \
        -H "ldap://$REPLICA_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin \
        -b 'dc=cae,dc=local' -s one dn
    - |
      echo "=== Replica write rejection ==="
      LDAPTLS_REQCERT=never ldapadd -x -ZZ \
        -H "ldap://$REPLICA_IP:389" \
        -D 'cn=admin,dc=cae,dc=local' -w admin >/dev/null 2>&1 <<LDIF || true
      dn: cn=ci-test,dc=cae,dc=local
      objectClass: top
      objectClass: organizationalRole
      cn: ci-test
      LDIF

test-sync:
  stage: test
  image: alpine:3.21
  needs: [deploy]
  before_script:
    - apk add --no-cache openldap-clients jq
    - MASTER_IP=$(jq -r '.master_public_ip.value' $TF_ROOT/outputs.json)
    - REPLICA_IP=$(jq -r '.replica_public_ip.value' $TF_ROOT/outputs.json)
    - BASE_DN=$(jq -r '.ldap_admin_dn.value' $TF_ROOT/outputs.json | sed 's/cn=admin,//')
  script:
    - TEST_UID="ci-sync-$(date -u +%Y%m%d%H%M%S)"
    - |
      echo "=== Write test user to master ==="
      ldapadd -x -H "ldap://$MASTER_IP:389" \
        -D "cn=admin,$BASE_DN" -w admin <<LDIF
      dn: uid=$TEST_UID,ou=people,$BASE_DN
      objectClass: inetOrgPerson
      cn: CI Sync Test
      sn: Test
      uid: $TEST_UID
      LDIF
    - |
      echo "=== Wait for replication ==="
      sleep 15
    - |
      echo "=== Verify test user on replica ==="
      LDAPTLS_REQCERT=never ldapsearch -LLL -x -ZZ \
        -H "ldap://$REPLICA_IP:389" \
        -D "cn=admin,$BASE_DN" -w admin \
        -b "$BASE_DN" "(uid=$TEST_UID)" dn
    - |
      echo "=== Cleanup ==="
      ldapdelete -x -H "ldap://$MASTER_IP:389" \
        -D "cn=admin,$BASE_DN" -w admin \
        "uid=$TEST_UID,ou=people,$BASE_DN"

# ---------------------------------------------------------------------------
# Stage 4 — Destroy (always runs)
# ---------------------------------------------------------------------------

destroy:
  stage: destroy
  image:
    name: amazon/aws-cli:latest
    entrypoint: [""]
  needs: []
  when: always
  allow_failure: true
  script:
    - |
      echo "=== Destroying all openldap-mr EC2 instances ==="
      for id in $(aws ec2 describe-instances \
        --filters "Name=tag:Project,Values=openldap-mr" "Name=instance-state-name,Values=running,stopped" \
        --query 'Reservations[*].Instances[*].InstanceId' --output text); do
        echo "Terminating $id"
        aws ec2 terminate-instances --instance-ids $id || true
      done
    - |
      echo "Waiting for instances to terminate..."
      sleep 30
    - |
      echo "=== Destroying all openldap-mr VPCs ==="
      for vpc in $(aws ec2 describe-vpcs \
        --filters "Name=tag:Project,Values=openldap-mr" \
        --query 'Vpcs[*].VpcId' --output text); do
        echo "Deleting dependent resources for $vpc..."
        # Detach and delete IGWs
        for igw in $(aws ec2 describe-internet-gateways \
          --filters "Name=attachment.vpc-id,Values=$vpc" \
          --query 'InternetGateways[*].InternetGatewayId' --output text); do
          aws ec2 detach-internet-gateway --internet-gateway-id $igw --vpc-id $vpc 2>/dev/null || true
          aws ec2 delete-internet-gateway --internet-gateway-id $igw 2>/dev/null || true
        done
        # Delete subnets
        for sn in $(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$vpc" --query 'Subnets[*].SubnetId' --output text); do
          aws ec2 delete-subnet --subnet-id $sn 2>/dev/null || true
        done
        # Delete non-default security groups
        for sg in $(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$vpc" --query 'SecurityGroups[?GroupName!=`default`].GroupId' --output text); do
          aws ec2 delete-security-group --group-id $sg 2>/dev/null || true
        done
        # Delete non-main route tables
        for rt in $(aws ec2 describe-route-tables --filters "Name=vpc-id,Values=$vpc" --query 'RouteTables[?Associations[0].Main==`false`].RouteTableId' --output text); do
          aws ec2 delete-route-table --route-table-id $rt 2>/dev/null || true
        done
        # Delete network interfaces
        for eni in $(aws ec2 describe-network-interfaces --filters "Name=vpc-id,Values=$vpc" --query 'NetworkInterfaces[*].NetworkInterfaceId' --output text); do
          aws ec2 delete-network-interface --network-interface-id $eni 2>/dev/null || true
        done
        sleep 10
        # Delete VPC
        aws ec2 delete-vpc --vpc-id $vpc 2>/dev/null && echo "Deleted VPC $vpc" || echo "Could not delete VPC $vpc (may have remaining deps)"
      done
    - |
      echo "=== Deleting openldap-mr key pairs ==="
      for kp in $(aws ec2 describe-key-pairs \
        --filters "Name=key-name,Values=openldap-mr-*" \
        --query 'KeyPairs[*].KeyName' --output text); do
        aws ec2 delete-key-pair --key-name "$kp" 2>/dev/null && echo "Deleted key pair $kp" || true
      done
    - |
      echo "=== Cleanup complete ==="
