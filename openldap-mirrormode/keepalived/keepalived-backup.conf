# Example Keepalived config (BACKUP)
# Update interface, VIP, and auth to match your environment.

vrrp_script chk_slapd {
  script "/usr/local/bin/check_slapd.sh"
  interval 2
  timeout 2
  weight -20
}

vrrp_instance VI_LDAP {
  state BACKUP
  interface eth0
  virtual_router_id 51
  priority 100
  advert_int 1
  authentication {
    auth_type PASS
    auth_pass 42secret
  }
  virtual_ipaddress {
    192.168.56.50/24 dev eth0
  }
  track_script {
    chk_slapd
  }
}
